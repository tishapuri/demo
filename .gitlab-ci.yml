stages:
  - build
  - beta

cache:
  key:
    files:
      - Gemfile.lock
  paths:
    - vendor/bundle

build_ios:
  image: $IMAGE
  stage: build
  script:
    - bundle check --path vendor/bundle || bundle install --path vendor/bundle --jobs $(nproc)
    - bundle exec fastlane build
  tags: 
    - saas-macos-staging
  parallel:
    matrix:
      - IMAGE: macos-12-xcode-14
      - IMAGE: macos-13-xcode-14
      - IMAGE: macos-14-xcode-15

beta_ios:
  image: macos-13-xcode-14
  stage: beta
  script:
    - bundle check --path vendor/bundle || bundle install --path vendor/bundle --jobs $(nproc)
    - bundle exec fastlane beta
  tags: 
    - saas-macos-staging
  when: manual
  allow_failure: true
  only:
    refs:
      - main
