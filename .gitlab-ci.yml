stages:
  - build
  - beta

cache:
  key:
    files:
      - Gemfile.lock
  paths:
    - vendor/bundle

build_ios:
  image: macos-12-xcode-14
  stage: build
  script:
    - echo $SHELL
    - which ruby
    - gem list
    - source ~/.zshrc
    - echo $SHELL
    - which ruby
    - gem list
    - bundle check --path vendor/bundle || bundle install --path vendor/bundle --jobs $(nproc)
    - bundle exec fastlane build
  tags: 
    - macos-ventura-vm

beta_ios:
  image: macos-12-xcode-14
  stage: beta
  script:
    - bundle check --path vendor/bundle || bundle install --path vendor/bundle --jobs $(nproc)
    - bundle exec fastlane beta
  tags: 
    - macos-ventura-vm
  when: manual
  allow_failure: true
  only:
    refs:
      - main
